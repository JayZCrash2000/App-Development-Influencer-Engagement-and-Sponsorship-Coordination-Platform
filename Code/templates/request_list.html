<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Influencer - Ad Request List</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        /* Custom styles */
        body {
            margin: 0;
            padding: 0;
            padding-top: 56px; /* Adjust for fixed navbar */
            background-color: #f4f4f4;
        }
        .navbar-custom {
            background-color:#f8f9fa;
            box-shadow: 0 4px 6px -6px #222;
        }
        .navbar-custom .navbar-brand {
            color: red;
            font-size: 25px;
        }
        .navbar-custom .nav-link {
            font-size: 18px;
            color: #333;
        }
      
        
        header {
            background-color: #343a40;
            color: #ffffff;
            padding: 10px 20px;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1030;
        }
        .container {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 1000px;
            margin: auto;
        }
        .btn-custom {
            background-color: #4CAF50;
            color: white;
        }
        .btn-custom:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-custom fixed-top">
        <a class="navbar-brand" href="/">PLATFORM4U</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ml-auto">

                <li class="nav-item">
                    <li class="nav-item">
                        <span class="nav-link">User: {{ user.name }}</span>
                    </li>
                    {% if 'user' in session %}
                        <a class="nav-link" href="{{ url_for('logout') }}">Logout</a>
                    {% else %}
                        <a class="nav-link" href="{{ url_for('login') }}">Login</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('register') }}">Register</a>
                    </li>
                    {% endif %}
                </li>
            </ul>
        </div>
    </nav>

    <main class="container mt-5">
        <h2 class="mb-4">Request List</h2>
        <table class="table table-striped table-bordered">
            <thead>
                <tr>
                    <th>Campaign</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for request in requests %}
                    <tr>
                        <td>{{ request.campaign.name }}</td>
                        <td>{{ request.status }}</td>
                        <td>
                            <a href="/edit_ad_request/{{ request.id }}" class="btn btn-warning btn-sm">Edit</a>
                            <form method="POST" action="/delete_ad_request/{{ request.id }}" class="d-inline">
                                <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                            </form>
                        </td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    </main>

    <!-- Bootstrap JS and dependencies -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
