<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gem Influencer - Register</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <style>
        .container {
            margin-top: 30px;
        }

        .card {
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            border-radius: 5px;
        }

        .card-body {
            padding: 20px;
        }

        .navbar-custom {
            background-color: #f8f9fa;
            box-shadow: 0 4px 6px -6px #222;
        }

        .navbar-custom .navbar-brand {
            color: red;
            font-size: 25px;
        }

        .navbar-custom .nav-link {
            color: #555;
        }

        .navbar-custom .nav-link:hover {
            color: #007bff;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .btn-primary {
            width: 100px;
        }

        .btn-secondary {
            width: 100px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-custom">
        <a class="navbar-brand" href="/">PLATFORM4U</a>
        <ul class="navbar-nav ml-auto">
            {% if 'user' in session %}
                <li class="nav-item">
                    <span class="nav-link">User: {{ user.full_name }}</span>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/logout">Logout</a>
                </li>
            {% else %}
                <li class="nav-item">
                    <a class="nav-link" href="/login">Login</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/register">Register</a>
                </li>
            {% endif %}
        </ul>
    </nav>

    <div class="container">
        <h2>Register</h2>
        <div class="card">
            <div class="card-body">
                <form method="POST" action="/register">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="username" class="form-label">Username</label>
                                <input type="text" class="form-control" id="username" name="username" required>
                            </div>
                            <div class="form-group">
                                <label for="full-name" class="form-label">Full Name</label>
                                <input type="text" class="form-control" id="full-name" name="full-name" required>
                            </div>
                            <div class="form-group">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control" id="email" name="email" required>
                            </div>
                            <div class="form-group">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" class="form-control" id="password" name="password" required>
                            </div>
                            <div class="form-group">
                                <label for="confirm-password" class="form-label">Confirm Password</label>
                                <input type="password" class="form-control" id="confirm-password" name="confirm-password" required>
                            </div>
                            <div class="form-group">
                                <label for="role" class="form-label">Role</label>
                                <select class="form-select form-control" id="role" name="role" required>
                                    <option value="influencer">Influencer</option>
                                    <option value="sponsor">Sponsor</option>
                                </select>
                            </div>
                            <div class="form-group" id="influencer-fields">
                                <label for="category" class="form-label">Category</label>
                                <input type="text" class="form-control" id="category" name="category">
                                <label for="niche" class="form-label">Niche</label>
                                <input type="text" class="form-control" id="niche" name="niche">
                                <label for="reach" class="form-label">Reach</label>
                                <input type="text" class="form-control" id="reach" name="reach">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group" id="sponsor-fields">
                                <label for="industry" class="form-label">Industry</label>
                                <input type="text" class="form-control" id="industry" name="industry">
                                <label for="budget" class="form-label">Budget</label>
                                <input type="text" class="form-control" id="budget" name="budget">
                            </div>
                            <div class="form-group">
                                <label for="bio" class="form-label">Bio</label>
                                <textarea class="form-control" id="bio" name="bio"></textarea>
                            </div>
                            <div class="form-group button-group">
                                <button type="submit" class="btn btn-primary">Register</button>
                                <button type="button" onclick="window.location.href='/login'" class="btn btn-secondary">Back</button>
                            </div>
                        </div>
                    </div>
                    {% if error %}
                        <div class="alert alert-danger">{{ error }}</div>
                    {% endif %}
                </form>
            </div>
        </div>
    </div>

    <script>
        // Show/hide fields based on selected role
        const roleSelect = document.getElementById('role');
        const influencerFields = document.getElementById('influencer-fields');
        const sponsorFields = document.getElementById('sponsor-fields');

        roleSelect.addEventListener('change', () => {
            if (roleSelect.value === 'influencer') {
                influencerFields.style.display = 'block';
                sponsorFields.style.display = 'none';
            } else if (roleSelect.value === 'sponsor') {
                influencerFields.style.display = 'none';
                sponsorFields.style.display = 'block';
            }
        });

        // Initially hide fields
        influencerFields.style.display = 'none';
        sponsorFields.style.display = 'none';
    </script>
</body>
</html>
