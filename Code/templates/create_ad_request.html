<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Ad Request</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        /* Custom styles */
        body {
            padding-top: 56px; /* Adjust for fixed navbar */
            background-color: #f4f4f4;
        }
        .navbar-custom {
            background-color: #f8f9fa;
            box-shadow: 0 4px 6px -6px #222;
        }
        .navbar-custom .navbar-brand {
            color: red;
            font-size: 25px;
        }
        .navbar-custom .nav-link {
            font-size: 18px;
            color: #333;
        }
        .navbar-custom .nav-link:hover {
            color: #007bff;
        }
        header {
            background-color: #007bff;
            color: #fff;
            padding: 10px 0;
            text-align: center;
        }
        main {
            margin: 20px auto;
            max-width: 800px;
        }
        .container {
            background-color: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        form {
            display: flex;
            flex-direction: column;
        }
        label {
            margin-top: 10px;
            font-weight: bold;
        }
        textarea, input[type="number"] {
            margin-top: 5px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            margin-top: 20px;
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-custom fixed-top">
        <a class="navbar-brand" href="/">PLATFORM4U</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ml-auto">
                
                
                {% if 'user' in session %}
                    <li class="nav-item">
                        <span class="nav-link">User: {{ user.name }}</span>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/logout">Logout</a>
                    </li>
                {% else %}
                    <li class="nav-item">
                        <a class="nav-link" href="/login">Login</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/register">Register</a>
                    </li>
                {% endif %}
            </ul>
        </div>
    </nav>
    <main>
        <div class="container">
            <h2>Create Ad Request for {{ campaign.name }}</h2>
            <!-- Ensure the action URL is correct -->
            <form method="POST" action="{{ url_for('send_ad_request', campaign_id=campaign.id, influencer_id=user.id) }}">
                <!-- Use POST method to send form data -->
        
                <!-- Hidden input to pass influencer ID if not included in URL -->
                <input type="hidden" name="influencer_id" value="{{ user.id }}"> 
        
                <!-- Input fields for messages, requirements, and payment amount -->
                <label for="messages">Messages:</label>
                <textarea id="messages" name="messages" required></textarea>
        
                <label for="requirements">Requirements:</label>
                <textarea id="requirements" name="requirements" required></textarea>
        
                <label for="payment_amount">Payment Amount:</label>
                <input type="number" id="payment_amount" name="payment_amount" required>
        
                <!-- Submit button -->
                <button type="submit">Create Request</button>
            </form>
        </div>
    </main>

    <!-- Bootstrap JavaScript and dependencies -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
